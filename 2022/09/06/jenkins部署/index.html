<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">echo &quot;开始准备打包...&quot;</span><br><span class="line">source /etc/profile</span><br><span class="line">mvn install -s /home/root/apache-maven-3.8.6/conf/settings-mocha-portal.xml</span><br><span class="line">echo &quot;开始准备上传文件...&quot;</span><br><span class="line">echo &quot;$&#123;WORKSPACE&#125;&quot;</span><br><span class="line">cd $&#123;WORKSPACE&#125;/target/</span><br><span class="line">echo &quot;准备上传应用服务器...&quot;</span><br><span class="line">expect &lt;&lt; EOF</span><br><span class="line">set timeout 30</span><br><span class="line">spawn scp -P 22 mc-portal.jar root@172.27.17.59:/home/root/transport</span><br><span class="line">expect &#123;</span><br><span class="line">        &quot;*assword:&quot; &#123; send &quot;Szrd!234\r&quot;; &#125;</span><br><span class="line">        &quot;*yes/no*&quot; &#123; send &quot;yes\r&quot;; exp_continue &#125;</span><br><span class="line">&#125;</span><br><span class="line">expect eof</span><br><span class="line">EOF</span><br><span class="line">echo &quot;上传完成...&quot;</span><br></pre></td></tr></table></figure>
